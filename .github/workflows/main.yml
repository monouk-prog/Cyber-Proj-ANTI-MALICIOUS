name: Compile Python and PowerShell Executables

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build-windows:
    # Crucial: Must use Windows to compile Windows .exe files
    runs-on: windows-latest

    steps:
    # Step 1: Pull your repository code into the runner
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Install Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Change to your preferred Python version
        cache: 'pip'          # Caches packages to speed up future runs

    # Step 3: Install PyInstaller and any project dependencies
    - name: Install Dependencies
      shell: powershell
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    # Step 4: Compile the Python scripts into standalone .exes
    - name: Build Executables with PyInstaller
      shell: powershell
      run: |
        pyinstaller --onefile --windowed a/a.py
        pyinstaller --onefile --windowed b/b.py
        pyinstaller --onefile --windowed c/c.py
        pyinstaller --onefile --windowed d/d.py
        pyinstaller --onefile --windowed e/e.py

    # Step 5: Override policy restrictions, install ps2exe, and compile PowerShell scripts
    - name: Install ps2exe and Build PowerShell EXEs
      shell: powershell
      run: |
        # Override execution policy for this automated process
        Set-ExecutionPolicy Bypass -Scope Process -Force
        
        # Avoid hanging on interactive prompts by trusting PSGallery
        Set-PSRepository PSGallery -InstallationPolicy Trusted
        
        # Install and import ps2exe
        Install-Module ps2exe -Force -AllowClobber
        Import-Module ps2exe -Force
        
        # Compile your PowerShell scripts into the root folder or a specific directory
        # (Replace 'script1.ps1' with your actual .ps1 filenames)
        Invoke-ps2exe .\script1.ps1 .\script1.exe
        Invoke-ps2exe .\script2.ps1 .\script2.exe

    # Step 6: Save all compiled files so you can download them from GitHub Actions panel
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-executables-and-scripts
        path: |
          dist/*.exe
          *.exe
          **/*.ps1

    # Step 7: Create GitHub Release and attach all compiled EXEs
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          Automated build of Python and PowerShell executables.
          
          **Assets included:**
          * Compiled Python Executables (a.exe, b.exe, etc.)
          * Compiled PowerShell Executables (script1.exe, etc.)
          * Original PowerShell automation scripts
        draft: false
        prerelease: false
        files: |
          dist/*.exe
          *.exe
          **/*.ps1
